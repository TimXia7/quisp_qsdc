[General]
network = networks.qsdc_network
sim-time-limit = 30s

# log name
*.logger.log_filename = "qsdc_starter.log"

# This essentiall tells the QRSA to accept entanglement requests, with no delay
**.EndToEndConnection = true
**.initial_notification_timing_buffer = 0s

# initiator is the one who generates traffic and requests the bellpairs
*.alice.is_initiator = true
*.bob.is_initiator = false

# alice requests n bell pairs, bob does not request any
*.alice.app.number_of_bellpair = 16
*.bob.app.number_of_bellpair = 0

# alice specifically only speaks with bob. alice choses any EndNode otherwise (Bob's address is 1)
*.alice.app.has_specific_recipients = true
*.alice.app.possible_recipients = [1]

# Simulation Code:













# Based on other ini files, default physics values
**.qrsa.hm.link_tomography = false
**.qrsa.hm.initial_purification = 0
**.qrsa.hm.purification_type = "none"