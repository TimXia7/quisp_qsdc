[General]
network = networks.qsdc_network
sim-time-limit = 30s

*.logger.log_filename = "qsdc_starter.log"
*.bufSize = ${bufSize=128}
*.checkSize = ${checkSize=32}

# set the buffer size, for our purposes, this is number of bell pairs to eventually be generated
**.alice.qnic*.num_buffer = ${bufSize}
**.alice.qnic_r*.num_buffer = ${bufSize}
**.bob.qnic*.num_buffer = ${bufSize}
**.bob.qnic_r*.num_buffer = ${bufSize}

# QRSA / entanglement settings
# Accept end-to-end entanglement immediately
**.EndToEndConnection = true
**.initial_notification_timing_buffer = 0s

# Node roles
*.alice.is_initiator = true
*.bob.is_initiator = false

# Alice requests Bell pairs once
*.alice.app.number_of_bellpair = ${checkSize}
*.alice.app.bob_addr = 1

# Bob does nothing (receiver only)
*.bob.app.number_of_bellpair = 0
*.bob.app.bob_addr = 0   

# Sampling behavior
*.alice.app.min_pairs_to_start = ${checkSize}
*.alice.app.sample_target = ${checkSize}
*.alice.app.burn_count = int(${bufSize} * 0.10)
*.bob.app.burn_count = 0
*.alice.app.start_delay = 50us
*.alice.app.poll_interval = 10us
*.alice.app.sample_interval = 10us

# Set expected correlation:
*.alice.app.expect_anti = false

# Physics defaults 
**.qrsa.hm.link_tomography = false
**.qrsa.hm.initial_purification = 0
**.qrsa.hm.purification_type = "none"

# Dense-coding params
*.alice.app.payload = "hello"
*.alice.app.max_error_rate = 0.1

# Disable qubit errors
**.memory_x_error_rate = 0
**.memory_y_error_rate = 0
**.memory_z_error_rate = 0
**.memory_energy_excitation_rate = 0
**.memory_energy_relaxation_rate = 0
**.memory_completely_mixed_rate = 0

**.measurement_x_err_rate = 0
**.measurement_y_err_rate = 0
**.measurement_z_err_rate = 0

**.h_gate_err_rate = 0
**.h_gate_x_err_ratio = 0
**.h_gate_y_err_ratio = 0
**.h_gate_z_err_ratio = 0

**.x_gate_err_rate = 0
**.x_gate_x_err_ratio = 0
**.x_gate_y_err_ratio = 0
**.x_gate_z_err_ratio = 0

**.z_gate_err_rate = 0
**.z_gate_x_err_ratio = 0
**.z_gate_y_err_ratio = 0
**.z_gate_z_err_ratio = 0

**.cnot_gate_err_rate = 0



