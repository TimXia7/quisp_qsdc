[General]
network = networks.qsdc_network
sim-time-limit = 10s

*.logger.log_filename = "qsdc_starter.log"

# === Main system parameters: ===
*.buffer_size = ${buffer_size=256}
*.phase_1_size = ${phase_1_size=64}
*.phase_2_size = ${phase_2_size=64}

*.alice.app.payload = "hello world"
*.alice.app.phase1_max_error_rate = 0.1
*.alice.app.phase2_max_error_rate = 0.1

*.eveEnabled = ${eveEnabled=true}

# to always intercept, set to 1, for percents, do decimals (e.g. 0.5 for 50%)
*.eve_intercept_rate = ${eve_intercept_rate=0.25}

# === End of main system parameters: ===


# Other Parameters:

**.alice.qnic*.num_buffer = ${buffer_size}
**.alice.qnic_r*.num_buffer = ${buffer_size}
**.bob.qnic*.num_buffer = ${buffer_size}
**.bob.qnic_r*.num_buffer = ${buffer_size}

**.EndToEndConnection = true
**.initial_notification_timing_buffer = 0s

*.alice.is_initiator = true
*.bob.is_initiator = false

*.requestedPairs = ${buffer_size}
*.alice.app.number_of_bellpair = ${buffer_size}
*.alice.app.bob_addr = 1

*.bob.app.number_of_bellpair = 0
*.bob.app.bob_addr = 0

# Phase 1
*.alice.app.min_pairs_to_start = ${buffer_size}
*.alice.app.sample_target = ${phase_1_size}
*.alice.app.sample_block_size = 8

# Phase 2
*.alice.app.bell_sample_target = ${phase_2_size}
*.alice.app.bell_block_size = 8

# Archived Feature
*.alice.app.burn_count = 0# int(${buffer_size} * 0.10)

*.bob.app.burn_count = 0
*.alice.app.start_delay = 50us
*.alice.app.poll_interval = 10us
*.alice.app.sample_interval = 10us

*.alice.app.expect_anti = false

**.qrsa.hm.link_tomography = false
**.qrsa.hm.initial_purification = 0
**.qrsa.hm.purification_type = "none"

*.alice.app.eve_enabled = ${eveEnabled}
*.bob.app.eve_enabled = ${eveEnabled}

*.alice.app.eve_intercept_probability = ${eve_intercept_rate}
*.bob.app.eve_intercept_probability = ${eve_intercept_rate}

**.memory_x_error_rate = 0
**.memory_y_error_rate = 0
**.memory_z_error_rate = 0
**.memory_energy_excitation_rate = 0
**.memory_energy_relaxation_rate = 0
**.memory_completely_mixed_rate = 0

**.measurement_x_err_rate = 0
**.measurement_y_err_rate = 0
**.measurement_z_err_rate = 0

**.h_gate_err_rate = 0
**.h_gate_x_err_ratio = 0
**.h_gate_y_err_ratio = 0
**.h_gate_z_err_ratio = 0

**.x_gate_err_rate = 0
**.x_gate_x_err_ratio = 0
**.x_gate_y_err_ratio = 0
**.x_gate_z_err_ratio = 0

**.z_gate_err_rate = 0
**.z_gate_x_err_ratio = 0
**.z_gate_y_err_ratio = 0
**.z_gate_z_err_ratio = 0

**.cnot_gate_err_rate = 0

seed-set = ${repetition}
